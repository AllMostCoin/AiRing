name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject API keys
        # Writes docs/config.js with keys from repository secrets.
        # If a secret is not set, the value is an empty string so the
        # app falls back to demo mode (or lets the user supply their own key).
        # Keys are JSON-encoded to prevent injection from special characters.
        #
        # ── What each secret does ────────────────────────────────────────────────
        # GEMINI_API_KEY  — injected directly; Gemini is called from the browser
        #                   (Google's API supports browser CORS).  Without this
        #                   Gemini runs in demo mode on GitHub Pages.
        #
        # GROK_API_KEY    — stored in the browser as window.AIRING_GROK_KEY and
        #                   sent to the backend proxy (/api/grok-proxy) at request
        #                   time; the backend then forwards it server-side to xAI.
        #                   xAI's API does not support browser CORS, so a working
        #                   BACKEND_URL is also required for Grok to go LIVE.
        #
        # BACKEND_URL     — URL of the self-hosted Node.js backend (e.g. the
        #                   Render.com service).  Without it only Gemini, Claude,
        #                   and GPT-4 (if a key is provided) will run live on
        #                   GitHub Pages.  With it the backend handles Grok,
        #                   OpenClaw, Copilot, and Ollama as well.
        #
        # OPENAI_API_KEY  — injected directly as window.AIRING_OPENAI_KEY;
        #                   OpenAI's API supports browser CORS, so GPT-4 can be
        #                   called straight from the browser just like Gemini and
        #                   Claude.  Without this secret GPT-4 runs in demo mode
        #                   on GitHub Pages (users can still supply their own key
        #                   via the in-app settings panel).
        #
        # CLAUDE_API_KEY — injected directly as window.AIRING_CLAUDE_KEY;
        #                  Anthropic's API supports browser CORS via the
        #                  anthropic-dangerous-direct-browser-access header,
        #                  so Claude can be called straight from the browser
        #                  just like Gemini.  Without this secret Claude runs
        #                  in demo mode on GitHub Pages (users can still supply
        #                  their own key via the in-app settings panel).
        #
        # OPENCLAW_TOKEN  — stored as window.AIRING_OPENCLAW_TOKEN and sent to
        #                   the backend proxy (/api/openclaw-proxy) at request
        #                   time; the backend forwards it to the OpenClaw gateway.
        #                   OpenClaw's gateway does not support browser CORS, so a
        #                   working BACKEND_URL is also required to go LIVE.
        #
        # COPILOT_API_KEY — a GitHub PAT with models:read permission; stored
        #                   as window.AIRING_COPILOT_KEY and sent to the backend
        #                   proxy (/api/copilot-proxy) at request time.  The
        #                   GitHub Models inference endpoint does not support
        #                   browser CORS, so a working BACKEND_URL is also
        #                   required for Copilot to go LIVE.  Token formats:
        #                   github_pat_… (fine-grained) or ghp_… (classic).
        run: |
          node -e '
            const fs = require("fs");
            const crypto = require("crypto");
            const loginPwd = process.env.LOGIN_PASSWORD || "";
            const loginHash = loginPwd
              ? crypto.createHash("sha256").update(loginPwd).digest("hex")
              : "";
            const lines = [
              `window.AIRING_GEMINI_KEY  = ${JSON.stringify(process.env.GEMINI_API_KEY || "")};`,
              `window.AIRING_GROK_KEY    = ${JSON.stringify(process.env.GROK_API_KEY || "")};`,
              `window.AIRING_CLAUDE_KEY  = ${JSON.stringify(process.env.CLAUDE_API_KEY || "")};`,
              `window.AIRING_OPENAI_KEY  = ${JSON.stringify(process.env.OPENAI_API_KEY || "")};`,
              `window.AIRING_OPENCLAW_TOKEN = ${JSON.stringify(process.env.OPENCLAW_TOKEN || "")};`,
              `window.AIRING_COPILOT_KEY = ${JSON.stringify(process.env.COPILOT_API_KEY || "")};`,
              `window.AIRING_API_BASE    = ${JSON.stringify(process.env.BACKEND_URL || "")};`,
              `window.AIRING_LOGIN_HASH  = ${JSON.stringify(loginHash)};`,
            ];
            fs.writeFileSync("docs/config.js", lines.join("\n") + "\n");
          '
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENCLAW_TOKEN: ${{ secrets.OPENCLAW_TOKEN }}
          COPILOT_API_KEY: ${{ secrets.COPILOT_API_KEY }}
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          LOGIN_PASSWORD: ${{ secrets.LOGIN_PASSWORD }}

      - name: Warn if backend required but BACKEND_URL not set
        # Copilot, Grok, and OpenClaw all need the Node.js backend to handle CORS.
        # If any of their keys are configured but BACKEND_URL is absent, the models
        # will silently stay in DEMO mode on GitHub Pages.  Surface a clear warning
        # in the workflow log so the deployer knows what to do next.
        env:
          COPILOT_API_KEY: ${{ secrets.COPILOT_API_KEY }}
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          OPENCLAW_TOKEN: ${{ secrets.OPENCLAW_TOKEN }}
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
        run: |
          if ([ -n "$COPILOT_API_KEY" ] || [ -n "$GROK_API_KEY" ] || [ -n "$OPENCLAW_TOKEN" ]) && [ -z "$BACKEND_URL" ]; then
            echo "::warning::BACKEND_URL is not set. Copilot, Grok, and OpenClaw will run in DEMO mode on GitHub Pages because their APIs block browser CORS. Deploy the Node.js backend (see render.yaml or Dockerfile) and add BACKEND_URL to your repository secrets to enable live mode for these models."
          fi
          if echo "$BACKEND_URL" | grep -q '^http://'; then
            echo "::warning::BACKEND_URL starts with http:// instead of https://. GitHub Pages is served over HTTPS; browser mixed-content rules will block all API calls to an http:// backend (including Phantom-dependent portfolio and trading features). Update BACKEND_URL to use https://."
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
