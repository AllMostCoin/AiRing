name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - copilot/gemini-api-work
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject API keys
        # Writes docs/config.js with keys from repository secrets.
        # If a secret is not set, the value is an empty string so the
        # app falls back to demo mode (or lets the user supply their own key).
        run: |
          {
            echo "window.AIRING_GEMINI_KEY = '${GEMINI_API_KEY}';"
            echo "window.AIRING_GROK_KEY   = '${GROK_API_KEY}';"
          } > docs/config.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
