name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject API keys
        # Writes docs/config.js with keys from repository secrets.
        # If a secret is not set, the value is an empty string so the
        # app falls back to demo mode (or lets the user supply their own key).
        # Keys are JSON-encoded to prevent injection from special characters.
        #
        # ── What each secret does ────────────────────────────────────────────────
        # GEMINI_API_KEY  — injected directly; Gemini is called from the browser
        #                   (Google's API supports browser CORS).  Without this
        #                   Gemini runs in demo mode on GitHub Pages.
        #
        # GROK_API_KEY    — stored in the browser as window.AIRING_GROK_KEY and
        #                   sent to the backend proxy (/api/grok-proxy) at request
        #                   time; the backend then forwards it server-side to xAI.
        #                   xAI's API does not support browser CORS, so a working
        #                   BACKEND_URL is also required for Grok to go LIVE.
        #
        # BACKEND_URL     — URL of the self-hosted Node.js backend (e.g. the
        #                   Render.com service).  **This is the single most
        #                   important secret for getting all seven models LIVE.**
        #                   Without it only Gemini (and Claude, if the user
        #                   provides their own key in the settings panel) will
        #                   run live on GitHub Pages.  With it the backend handles
        #                   GPT-4, Claude, Mistral, Copilot, Grok, and Ollama.
        #
        # Claude (Anthropic) keys are intentionally NOT injected here — they
        # would be publicly readable in the static Pages output.  The backend
        # uses its own ANTHROPIC_API_KEY env var; users can also supply a
        # personal Claude key in the in-app settings panel for direct calls.
        run: |
          node -e '
            const fs = require("fs");
            const lines = [
              `window.AIRING_GEMINI_KEY = ${JSON.stringify(process.env.GEMINI_API_KEY || "")};`,
              `window.AIRING_GROK_KEY   = ${JSON.stringify(process.env.GROK_API_KEY || "")};`,
              `window.AIRING_API_BASE   = ${JSON.stringify(process.env.BACKEND_URL || "")};`,
            ];
            fs.writeFileSync("docs/config.js", lines.join("\n") + "\n");
          '
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          BACKEND_URL: ${{ secrets.BACKEND_URL }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
