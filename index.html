<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Ring — AI Fights Your Question</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0d0d0d;
      color: #f0f0f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
    }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    .ring-emoji { font-size: 3.5rem; display: block; margin-bottom: .4rem; }
    h1 {
      font-size: 2.8rem;
      font-weight: 900;
      letter-spacing: .05em;
      background: linear-gradient(135deg, #ff4e50, #f9d423);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .tagline {
      margin-top: .4rem;
      color: #aaa;
      font-size: .95rem;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    /* ── Card ── */
    .card {
      width: 100%;
      max-width: 680px;
      background: #1a1a1a;
      border: 1px solid #2e2e2e;
      border-radius: 1.2rem;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.4rem;
    }

    label {
      display: block;
      font-size: .8rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: .45rem;
    }

    input[type="password"],
    input[type="text"],
    textarea,
    select {
      width: 100%;
      background: #111;
      border: 1px solid #333;
      border-radius: .6rem;
      color: #f0f0f0;
      font-size: 1rem;
      padding: .7rem 1rem;
      outline: none;
      transition: border-color .2s;
    }
    input[type="password"]:focus,
    input[type="text"]:focus,
    textarea:focus,
    select:focus { border-color: #f9d423; }

    textarea { resize: vertical; min-height: 100px; line-height: 1.5; }

    select option { background: #1a1a1a; }

    /* ── Model row ── */
    .row { display: flex; gap: 1rem; }
    .row > * { flex: 1; }

    /* ── Submit button ── */
    .btn {
      padding: .85rem 1.5rem;
      border: none;
      border-radius: .7rem;
      font-size: 1.05rem;
      font-weight: 800;
      cursor: pointer;
      letter-spacing: .05em;
      text-transform: uppercase;
      transition: opacity .2s, transform .1s;
    }
    .btn:active { transform: scale(.97); }
    .btn-fight {
      background: linear-gradient(135deg, #ff4e50, #f9d423);
      color: #000;
      width: 100%;
    }
    .btn:disabled { opacity: .4; cursor: not-allowed; }

    /* ── Answer box ── */
    .answer-wrap { display: none; }
    .answer-wrap.visible { display: block; }
    .answer-header {
      display: flex;
      align-items: center;
      gap: .5rem;
      font-size: .8rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: #f9d423;
      margin-bottom: .6rem;
    }
    .answer-body {
      background: #111;
      border: 1px solid #2e2e2e;
      border-radius: .7rem;
      padding: 1.1rem 1.3rem;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .answer-body.error { border-color: #ff4e50; color: #ff7070; }

    /* ── Spinner ── */
    .spinner {
      display: inline-block;
      width: 1.1rem; height: 1.1rem;
      border: 2px solid #444;
      border-top-color: #f9d423;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Key hint ── */
    .key-hint {
      font-size: .78rem;
      color: #555;
      text-align: center;
    }
    .key-hint a { color: #f9d423; text-decoration: none; }
    .key-hint a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <header>
    <span class="ring-emoji">🥊</span>
    <h1>AI Ring</h1>
    <p class="tagline">Where AI fights your question</p>
  </header>

  <div class="card">

    <!-- API Key -->
    <div>
      <label for="apiKey">Google AI API Key</label>
      <input type="password" id="apiKey" placeholder="AIza…" autocomplete="off" />
      <p class="key-hint" style="margin-top:.5rem">
        Get a free key at <a href="https://aistudio.google.com/app/apikey" target="_blank" rel="noopener">aistudio.google.com</a>.
        Your key is never sent anywhere except Google.
      </p>
    </div>

    <!-- Model selector -->
    <div>
      <label for="model">Model</label>
      <select id="model">
        <option value="gemini-2.0-flash">gemini-2.0-flash (fast)</option>
        <option value="gemini-1.5-flash">gemini-1.5-flash</option>
        <option value="gemini-1.5-pro" selected>gemini-1.5-pro (smart)</option>
        <option value="gemini-2.0-pro-exp">gemini-2.0-pro-exp (experimental)</option>
      </select>
    </div>

    <!-- Question -->
    <div>
      <label for="question">Your Question</label>
      <textarea id="question" placeholder="Ask anything — step into the ring…"></textarea>
    </div>

    <!-- Submit -->
    <button class="btn btn-fight" id="fightBtn" onclick="fight()">⚔️ Fight!</button>

    <!-- Answer -->
    <div class="answer-wrap" id="answerWrap">
      <div class="answer-header">
        <span id="answerIcon">🤖</span>
        <span>AI's Answer</span>
      </div>
      <div class="answer-body" id="answerBody"></div>
    </div>

  </div>

  <script>
    const STORAGE_KEY = 'airing_api_key';
    const STORAGE_MODEL = 'airing_model';

    const apiKeyInput  = document.getElementById('apiKey');
    const modelSelect  = document.getElementById('model');
    const questionEl   = document.getElementById('question');
    const fightBtn     = document.getElementById('fightBtn');
    const answerWrap   = document.getElementById('answerWrap');
    const answerBody   = document.getElementById('answerBody');
    const answerIcon   = document.getElementById('answerIcon');

    // Restore saved values
    const savedKey   = localStorage.getItem(STORAGE_KEY);
    const savedModel = localStorage.getItem(STORAGE_MODEL);
    if (savedKey)   apiKeyInput.value = savedKey;
    if (savedModel) modelSelect.value = savedModel;

    apiKeyInput.addEventListener('change', () =>
      localStorage.setItem(STORAGE_KEY, apiKeyInput.value.trim())
    );
    modelSelect.addEventListener('change', () =>
      localStorage.setItem(STORAGE_MODEL, modelSelect.value)
    );

    async function fight() {
      const apiKey   = apiKeyInput.value.trim();
      const model    = modelSelect.value;
      const question = questionEl.value.trim();

      if (!apiKey) {
        showAnswer('⚠️ Please enter your Google AI API key above.', true);
        return;
      }
      if (!question) {
        showAnswer('⚠️ Please type a question first!', true);
        return;
      }

      // Persist key
      localStorage.setItem(STORAGE_KEY, apiKey);
      localStorage.setItem(STORAGE_MODEL, model);

      setLoading(true);

      const url =
        `https://generativelanguage.googleapis.com/v1beta/models/${encodeURIComponent(model)}:generateContent?key=${encodeURIComponent(apiKey)}`;

      const body = {
        contents: [{ parts: [{ text: question }] }]
      };

      try {
        const res  = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });

        const data = await res.json();

        if (!res.ok) {
          const msg = data?.error?.message || `HTTP ${res.status}`;
          showAnswer(`❌ API error: ${msg}`, true);
          return;
        }

        const text = data?.candidates?.[0]?.content?.parts?.[0]?.text;
        if (!text) {
          showAnswer('❌ Gemini returned an empty response.', true);
          return;
        }

        showAnswer(text, false);
      } catch (err) {
        showAnswer(`❌ Network error: ${err.message}`, true);
      } finally {
        setLoading(false);
      }
    }

    function showAnswer(text, isError) {
      answerBody.textContent = text;
      answerBody.className   = 'answer-body' + (isError ? ' error' : '');
      answerIcon.textContent = isError ? '⚠️' : '🤖';
      answerWrap.classList.add('visible');
      answerWrap.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function setLoading(on) {
      fightBtn.disabled    = on;
      fightBtn.innerHTML   = on
        ? '<span class="spinner"></span>&nbsp; Fighting…'
        : '⚔️ Fight!';
    }

    // Allow Ctrl+Enter / Cmd+Enter to submit
    questionEl.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') fight();
    });
  </script>

</body>
</html>
